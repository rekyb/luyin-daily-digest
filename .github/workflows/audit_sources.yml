name: Weekly Source Audit

on:
  schedule:
    # Runs at 00:00 UTC every Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run source audit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python audit_sources.py

      - name: Commit updated sources
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sources.yaml audit_log.txt
          git diff --staged --quiet || git commit -m "chore: weekly source audit update"
          git push

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy updated Cloud Function
        uses: google-github-actions/deploy-cloud-functions@v3
        with:
          name: luyin-daily-digest
          region: asia-southeast1
          runtime: python312
          entry_point: handler
          source_dir: .
          project_id: ${{ secrets.GCP_PROJECT_ID }}
